[theme]
# Dark modern theme inspired by Spotify
base = "dark"

# Primary color: Spotify green
primaryColor = "#1DB954"

# App main background
backgroundColor = "#050505"

# Secondary background: cards, widgets, containers and inputs
secondaryBackgroundColor = "#181818"

# Main text color
textColor = "#FFFFFF"

# Fonts
font = "sans-serif"
headingFont = "sans-serif"
codeFont = "monospace"

# Base font size
baseFontSize = 18

# Rounded borders
baseRadius = "1rem"
buttonRadius = "full"

# Borders
borderColor = "#2A2A2A"
showWidgetBorder = true
showSidebarBorder = true

# Dataframes
dataframeBorderColor = "#2A2A2A"
dataframeHeaderBackgroundColor = "#121212"

# Links
linkColor = "#1ED760"
linkUnderline = false

# Chart colors
chartCategoricalColors = [
    "#1DB954",
    "#1ED760",
    "#B3B3B3",
    "#FFFFFF",
    "#535353",
    "#A7F3D0",
    "#22C55E"
]

chartSequentialColors = [
    "#051B0A",
    "#0B3D16",
    "#126622",
    "#1DB954",
    "#1ED760",
    "#A7F3D0"
]


[theme.sidebar]
# Dark sidebar in SaaS panel style
backgroundColor = "#000000"
secondaryBackgroundColor = "#121212"
textColor = "#FFFFFF"
primaryColor = "#1DB954"
borderColor = "#242424"
linkColor = "#1ED760"
linkUnderline = false
